{% extends "base.html" %}

{% block title %}Edit Tournament - E-Sports Team Manager{% endblock %}

{% block content %}
<h1><i class="fas fa-edit"></i> Edit Tournament</h1>

<div class="card">
    <form method="POST" action="/tournament/{{ tournament['TournamentID'] }}/edit">
        <div class="form-row">
            <div class="form-group">
                <label for="tournament_name">Tournament Name</label>
                <input type="text" id="tournament_name" name="tournament_name"
                    value="{{ tournament['TournamentName'] }}" required placeholder="e.g., Spring Championship 2023">
            </div>
            <div class="form-group">
                <label for="game">Game</label>
                <select id="game" name="game" required>
                    <option value="">-- Select Game --</option>
                    <option value="League of Legends" {% if tournament['Game']=='League of Legends' %}selected{% endif
                        %}>League of Legends</option>
                    <option value="Dota 2" {% if tournament['Game']=='Dota 2' %}selected{% endif %}>Dota 2</option>
                    <option value="CS:GO" {% if tournament['Game']=='CS:GO' %}selected{% endif %}>CS:GO</option>
                    <option value="Valorant" {% if tournament['Game']=='Valorant' %}selected{% endif %}>Valorant
                    </option>
                    <option value="Overwatch" {% if tournament['Game']=='Overwatch' %}selected{% endif %}>Overwatch
                    </option>
                </select>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="start_date">Start Date</label>
                <input type="date" id="start_date" name="start_date" value="{{ tournament['StartDate'] }}" required>
            </div>
            <div class="form-group">
                <label for="end_date">End Date</label>
                <input type="date" id="end_date" name="end_date" value="{{ tournament['EndDate'] }}" required>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="location">Location</label>
                <input type="text" id="location" name="location" value="{{ tournament['Location'] }}" required
                    placeholder="e.g., Bangkok">
            </div>
            <div class="form-group">
                <label for="prize_pool">Prize Pool ($)</label>
                <input type="number" id="prize_pool" name="prize_pool" step="0.01" value="{{ tournament['PrizePool'] }}"
                    required placeholder="0.00">
            </div>
        </div>
        <div class="action-buttons">
            <button type="submit" class="btn btn-success"><i class="fas fa-save"></i> Save Changes</button>
            <a href="/tournaments" class="btn btn-secondary"><i class="fas fa-times"></i> Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
