<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}E-Sports Team Manager{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Segoe+UI&display=swap');

        * {
            transition: all 0.3s ease;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1a1f3a 50%, #2d1b4e 100%);
            min-height: 100vh;
            overflow-x: hidden;
            color: #f1f5f9;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        h1 {
            font-size: 2.25rem;
            font-weight: 900;
            margin-bottom: 2rem;
            background: linear-gradient(to right, #a78bfa, #8b5cf6, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        h2 {
            font-size: 1.875rem;
            font-weight: 700;
            background: linear-gradient(to right, #a78bfa, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1.5rem;
        }

        /* Navigation */
        nav {
            position: sticky;
            top: 0;
            z-index: 50;
            backdrop-filter: blur(20px);
            padding: 1rem;
            background: linear-gradient(90deg, rgba(30, 41, 59, 0.98) 0%, rgba(51, 65, 85, 0.98) 100%);
            border-bottom: 2px solid;
            border-image: linear-gradient(90deg, #a78bfa, #8b5cf6, #6366f1) 1;
        }

        nav ul {
            max-width: 60rem;
            margin: 0 auto;
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            justify-content: center;
            list-style: none;
            padding: 0;
        }

        nav a {
            color: #f1f5f9;
            font-weight: bold;
            font-size: 0.95rem;
            padding: 0.5rem 0.75rem;
            border-radius: 0.5rem;
            position: relative;
            display: inline-block;
            text-decoration: none;
            transition: all 0.3s;
        }

        nav a:hover {
            color: #a78bfa;
            transform: translateY(-2px);
        }

        nav a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 2px;
            background: linear-gradient(to right, #a78bfa, #8b5cf6);
            transform: translateX(-50%);
            transition: width 0.3s;
        }

        nav a:hover::after {
            width: 80%;
        }

        /* Container */
        .container {
            max-width: 60rem;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        /* Cards */
        .card {
            backdrop-filter: blur(12px);
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.8) 0%, rgba(51, 65, 85, 0.5) 100%);
            border: 1px solid rgba(167, 139, 250, 0.2);
            border-radius: 1.5rem;
            padding: 1.5rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            margin-bottom: 2rem;
            transition: all 0.5s;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            border-color: rgba(167, 139, 250, 0.5);
            transform: translateY(-8px);
        }

        .card h2 {
            margin: 0 0 1rem 0;
        }

        .card-header {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(167, 139, 250, 0.2);
        }

        .card-header h2 {
            margin: 0;
        }

        .form-card {
            backdrop-filter: blur(12px);
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.1) 0%, rgba(99, 102, 241, 0.05) 100%);
            border: 2px solid rgba(167, 139, 250, 0.3);
            border-radius: 1.5rem;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .data-card {
            backdrop-filter: blur(12px);
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.9) 0%, rgba(30, 41, 59, 0.7) 100%);
            border: 1px solid rgba(167, 139, 250, 0.2);
            border-radius: 1.5rem;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        /* Forms */
        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #f1f5f9;
            font-size: 0.95rem;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 0.75rem 1rem;
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(8px);
            border: 2px solid rgba(167, 139, 250, 0.2);
            border-radius: 0.75rem;
            color: #f1f5f9;
            font-size: 1rem;
            transition: all 0.3s;
            font-family: inherit;
        }

        input::placeholder,
        select::placeholder {
            color: #94a3b8;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #a78bfa;
            background: rgba(30, 41, 59, 0.8);
            box-shadow: 0 0 20px rgba(167, 139, 250, 0.3), inset 0 0 10px rgba(167, 139, 250, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 8rem;
        }

        /* Form Layout */
        .form-row {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
        }

        @media (min-width: 768px) {
            .form-row {
                grid-template-columns: 1fr 1fr;
            }
        }

        .form-row.full {
            grid-template-columns: 1fr;
        }

        /* Tables */
        .table-container {
            overflow-x: auto;
            border-radius: 0.5rem;
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(8px);
            padding: 1rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        table thead {
            background: linear-gradient(to right, #8b5cf6, #6366f1);
            color: white;
        }

        table th {
            padding: 0.75rem 1rem;
            text-align: left;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        table td {
            padding: 0.75rem 1rem;
            font-size: 0.9rem;
            border-bottom: 1px solid rgba(167, 139, 250, 0.1);
            color: #cbd5e1;
        }

        table tbody tr {
            transition: background 0.3s;
        }

        table tbody tr:hover {
            background: rgba(167, 139, 250, 0.15);
        }

        table td strong {
            color: #a78bfa;
            font-weight: bold;
        }

        table td:first-child {
            font-weight: 600;
            color: #f1f5f9;
        }

        /* Buttons */
        .btn {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            font-weight: bold;
            border-radius: 0.75rem;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
            color: white;
            text-decoration: none;
            font-size: 1rem;
        }

        .btn-primary {
            background: linear-gradient(to right, #a78bfa, #8b5cf6, #6366f1);
            box-shadow: 0 8px 20px rgba(139, 92, 246, 0.3);
            transition: all 0.3s;
        }

        .btn-primary:hover {
            box-shadow: 0 12px 30px rgba(139, 92, 246, 0.5);
            transform: translateY(-2px);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: #475569;
            transition: all 0.3s;
        }

        .btn-secondary:hover {
            background: #374151;
        }

        .btn-danger {
            background: linear-gradient(to right, #ef4444, #dc2626);
            box-shadow: 0 8px 20px rgba(239, 68, 68, 0.3);
            transition: all 0.3s;
        }

        .btn-danger:hover {
            box-shadow: 0 12px 30px rgba(239, 68, 68, 0.5);
            transform: translateY(-2px);
        }

        .btn-success {
            background: linear-gradient(to right, #10b981, #059669);
            box-shadow: 0 8px 20px rgba(16, 185, 129, 0.3);
            transition: all 0.3s;
        }

        .btn-success:hover {
            box-shadow: 0 12px 30px rgba(16, 185, 129, 0.5);
            transform: translateY(-2px);
        }

        .btn-small {
            padding: 0.5rem 0.75rem;
            font-size: 0.8rem;
            height: 2.5rem;
        }

        /* Action Buttons */
        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            flex-wrap: wrap;
            margin-top: 1rem;
        }

        @media (min-width: 768px) {
            .action-buttons {
                flex-direction: row;
                gap: 0.75rem;
            }
        }

        .action-buttons .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        /* Alerts */
        .alert {
            padding: 1rem;
            margin-bottom: 1.5rem;
            border-radius: 0.75rem;
            border-left: 4px solid;
            backdrop-filter: blur(8px);
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.2);
            color: #fca5a5;
            border-left-color: #ef4444;
        }

        .alert-success {
            background: rgba(16, 185, 129, 0.2);
            color: #86efac;
            border-left-color: #10b981;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        @media (min-width: 768px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (min-width: 1024px) {
            .stats-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        .stat-card {
            backdrop-filter: blur(12px);
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.8) 0%, rgba(51, 65, 85, 0.5) 100%);
            border: 1px solid rgba(167, 139, 250, 0.2);
            border-radius: 1.5rem;
            padding: 2rem;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            transition: all 0.5s;
            position: relative;
            overflow: hidden;
        }

        .stat-card:hover {
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            border-color: rgba(167, 139, 250, 0.5);
            transform: translateY(-12px);
        }

        .stat-number {
            font-size: 3rem;
            font-weight: 900;
            background: linear-gradient(to right, #a78bfa, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }

        .stat-label {
            color: #94a3b8;
            font-weight: bold;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .stat-icon {
            font-size: 2.5rem;
            color: #a78bfa;
            margin-bottom: 1rem;
            display: inline-block;
        }

        .stat-content {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Quick Links */
        .quick-links-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-top: 2rem;
        }

        @media (min-width: 640px) {
            .quick-links-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 1.5rem;
            }
        }

        @media (min-width: 1024px) {
            .quick-links-grid {
                grid-template-columns: repeat(5, 1fr);
                gap: 1.5rem;
            }
        }

        .quick-link-card {
            position: relative;
            overflow: hidden;
            border-radius: 1rem;
            border: 2px solid rgba(167, 139, 250, 0.3);
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(8px);
            padding: 1.5rem 1rem;
            text-align: center;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: inherit;
            cursor: pointer;
        }

        .quick-link-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(167, 139, 250, 0.1), transparent);
            transition: left 0.5s;
            z-index: 0;
        }

        .quick-link-card:hover::before {
            left: 100%;
        }

        .quick-link-card:hover {
            border-color: rgba(167, 139, 250, 0.6);
            transform: translateY(-12px) scale(1.02);
            box-shadow: 0 20px 40px rgba(167, 139, 250, 0.3);
        }

        .quick-link-icon {
            font-size: 2.5rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-bottom: 0.75rem;
            color: #a78bfa;
            position: relative;
            z-index: 1;
        }

        @media (min-width: 768px) {
            .quick-link-icon {
                font-size: 3rem;
            }
        }

        .quick-link-card:hover .quick-link-icon {
            transform: scale(1.3) rotate(12deg);
            color: #8b5cf6;
            text-shadow: 0 0 20px rgba(139, 92, 246, 0.6);
        }

        .quick-link-title {
            font-weight: bold;
            font-size: 0.95rem;
            color: #f1f5f9;
            margin-bottom: 0.35rem;
            position: relative;
            z-index: 1;
        }

        .quick-link-desc {
            font-size: 0.75rem;
            color: #cbd5e1;
            line-height: 1.4;
            margin-bottom: 0.5rem;
            position: relative;
            z-index: 1;
        }

        .quick-link-arrow {
            font-size: 1rem;
            color: #a78bfa;
            opacity: 0;
            transition: all 0.3s;
            position: relative;
            z-index: 1;
        }

        .quick-link-card:hover .quick-link-arrow {
            opacity: 1;
            transform: translateX(4px);
        }

        /* Responsive adjustments */
        @media (max-width: 640px) {
            h1 {
                font-size: 1.75rem;
                margin-bottom: 1.5rem;
            }

            .container {
                padding: 1rem 0.5rem;
            }

            .card {
                padding: 1rem;
                margin-bottom: 1.5rem;
            }

            input,
            select,
            textarea {
                padding: 0.625rem;
                font-size: 1rem;
            }

            .btn-small {
                padding: 0.375rem;
                font-size: 0.7rem;
                height: 2.25rem;
            }

            .stats-grid {
                grid-template-columns: 1fr;
                gap: 1rem;
            }

            nav ul {
                gap: 0.5rem;
            }

            nav a {
                padding: 0.375rem 0.5rem;
                font-size: 0.8rem;
            }
        }
    </style>
</head>

<body>
    <nav>
        <ul>
            <li><a href="/"><i class="fas fa-home"></i> Home</a></li>
            <li><a href="/dashboard"><i class="fas fa-chart-line"></i> Dashboard</a></li>
            <li><a href="/teams"><i class="fas fa-users"></i> Teams</a></li>
            <li><a href="/players"><i class="fas fa-user-friends"></i> Players</a></li>
            <li><a href="/equipment"><i class="fas fa-headphones"></i> Equipment</a></li>
            <li><a href="/tournaments"><i class="fas fa-trophy"></i> Tournaments</a></li>
        </ul>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>

</html>
