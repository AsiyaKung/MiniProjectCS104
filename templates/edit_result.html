{% extends "base.html" %}

{% block content %}
<div style="max-width: 600px; margin: 2rem auto;">
    <div class="card form-card">
        <div class="card-header">
            <h1><i class="fas fa-edit"></i> Edit Tournament Result</h1>
        </div>
        <form method="POST" action="/result/{{ result['ResultID'] }}/edit">
            <div class="form-group">
                <label for="tournament_id">Tournament</label>
                <select id="tournament_id" name="tournament_id" required>
                    <option value="">Select Tournament</option>
                    {% for tournament in tournaments %}
                    <option value="{{ tournament['TournamentID'] }}" {% if
                        tournament['TournamentID']==result['TournamentID'] %}selected{% endif %}>
                        {{ tournament['TournamentName'] }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="team_id">Team</label>
                <select id="team_id" name="team_id" required>
                    <option value="">Select Team</option>
                    {% for team in teams %}
                    <option value="{{ team['TeamID'] }}" {% if team['TeamID']==result['TeamID'] %}selected{% endif %}>
                        {{ team['TeamName'] }}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="placement">Placement</label>
                <input type="number" id="placement" name="placement" min="1" value="{{ result['Placement'] }}" required
                    placeholder="e.g., 1">
            </div>

            <div class="form-group">
                <label for="prize_money">Prize Money ($)</label>
                <input type="number" id="prize_money" name="prize_money" step="0.01" value="{{ result['PrizeMoney'] }}"
                    required placeholder="0.00">
            </div>

            <div style="display: flex; gap: 1rem;">
                <button type="submit" class="btn btn-success" style="flex: 1;"><i class="fas fa-save"></i> Save
                    Changes</button>
                <a href="/tournaments" class="btn btn-secondary" style="flex: 1; text-align: center;"><i
                        class="fas fa-times"></i> Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
