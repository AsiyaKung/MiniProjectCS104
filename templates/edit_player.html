{% extends "base.html" %}

{% block title %}Edit Player - E-Sports Team Manager{% endblock %}

{% block content %}
<h1><i class="fas fa-edit"></i> Edit Player</h1>

<div class="card">
    <form method="POST" action="/player/{{ player['PlayerID'] }}/edit">
        <div class="form-row">
            <div class="form-group">
                <label for="player_name">Player Name</label>
                <input type="text" id="player_name" name="player_name" value="{{ player['PlayerName'] }}" required>
            </div>
            <div class="form-group">
                <label for="team_id">Team</label>
                <select id="team_id" name="team_id" required onchange="updatePositions()">
                    {% for team in teams %}
                    <option value="{{ team['TeamID'] }}" data-game-id="{{ team['GameID'] }}" {% if
                        team['TeamID']==player['TeamID'] %}selected{% endif %}>
                        {{ team['TeamName'] }} ({{ team['GameName'] or 'N/A' }})
                    </option>
                    {% endfor %}
                </select>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="position">Position</label>
                <select id="position" name="position" required>
                    <option value="{{ player['Position'] }}" selected>{{ player['Position'] }}</option>
                </select>
            </div>
            <div class="form-group">
                <label for="join_date">Join Date</label>
                <input type="date" id="join_date" name="join_date" value="{{ player['JoinDate'] }}" required>
            </div>
        </div>
        <div class="action-buttons">
            <button type="submit" class="btn btn-success"><i class="fas fa-save"></i> Save Changes</button>
            <a href="/players" class="btn btn-secondary"><i class="fas fa-times"></i> Cancel</a>
        </div>
    </form>
</div>

<script>
    async function updatePositions() {
        const teamSelect = document.getElementById('team_id');
        const positionSelect = document.getElementById('position');
        const selectedOption = teamSelect.options[teamSelect.selectedIndex];
        const gameId = selectedOption.dataset.gameId;
        const currentPosition = positionSelect.value;

        if (!gameId) {
            positionSelect.innerHTML = '<option value="">Select Position (Team First)</option>';
            return;
        }

        try {
            const response = await fetch(`/api/game-positions/${gameId}`);
            const positions = await response.json();

            positionSelect.innerHTML = '';
            positions.forEach(pos => {
                const option = document.createElement('option');
                option.value = pos.PositionName;
                option.textContent = pos.PositionName;
                if (pos.PositionName === currentPosition) {
                    option.selected = true;
                }
                positionSelect.appendChild(option);
            });
        } catch (error) {
            console.error('Error fetching positions:', error);
        }
    }

    // Load positions on page load
    document.addEventListener('DOMContentLoaded', updatePositions);
</script>
{% endblock %}
