{% extends "base.html" %}

{% block title %}Edit Team - E-Sports Team Manager{% endblock %}

{% block content %}
<h1><i class="fas fa-edit"></i> Edit Team</h1>

<div class="card">
    <form method="POST" action="/team/{{ team['TeamID'] }}/edit">
        <div class="form-row">
            <div class="form-group">
                <label for="team_name">Team Name</label>
                <input type="text" id="team_name" name="team_name" value="{{ team['TeamName'] }}" required>
            </div>
            <div class="form-group">
                <label for="game_id">Game</label>
                <select id="game_id" name="game_id" required>
                    <option value="">-- Select Game --</option>
                    {% for game in games %}
                    <option value="{{ game['GameID'] }}" {% if team['GameID']==game['GameID'] %}selected{% endif %}>
                        {{ game['GameName'] }} ({{ game['GameType'] }})
                    </option>
                    {% endfor %}
                </select>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label for="founded">Founded Date</label>
                <input type="date" id="founded" name="founded" value="{{ team['Founded'] }}" required>
            </div>
            <div class="form-group">
                <label for="coach">Coach Name</label>
                <input type="text" id="coach" name="coach" value="{{ team['Coach'] }}" required>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group" style="grid-column: span 2;">
                <label for="country">Country</label>
                <input type="text" id="country" name="country" value="{{ team['Country'] }}" required>
            </div>
        </div>
        <div class="action-buttons">
            <button type="submit" class="btn btn-success"><i class="fas fa-save"></i> Save Changes</button>
            <a href="/teams" class="btn btn-secondary"><i class="fas fa-times"></i> Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
